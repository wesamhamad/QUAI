# =============================================================================
# quailab.dev — one domain, two Laravel apps
#
#     /          ->  QUAI         (this repo's public/)
#     /qspark    ->  QSPARK demo  (QSPARK/public/ — a SEPARATE Laravel app)
#
# Why: QUAI's /qspark-demo page embeds the QSPARK app in an <iframe>. When
# QSPARK lived on its own host the browser blocked the frame ("refused to
# connect") and mismatched URLs 404'd. Mounting QSPARK under a PATH of the
# SAME origin makes the iframe same-origin, so framing just works and there is
# no second domain/cert/server to operate.
#
# This is NOT a code merge — the two apps stay independent (own composer.json,
# own database, own routes). nginx is the only thing that joins them.
#
# See deploy/SAME_DOMAIN_SETUP.md for the full picture + local-dev story.
# =============================================================================

server {
    listen 80;
    server_name quailab.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name quailab.dev;

    # --- TLS — adjust to your real cert paths --------------------------------
    ssl_certificate     /etc/letsencrypt/live/quailab.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quailab.dev/privkey.pem;

    # Git checkout root. QSPARK lives at $app_root/QSPARK (a nested Laravel app).
    set $app_root /var/www/quai;

    root  $app_root/public;          # QUAI is the default app
    index index.php;

    charset utf-8;
    client_max_body_size 50M;

    # IMPORTANT: do not add a blanket `add_header X-Frame-Options DENY` to this
    # server block — it would block the same-origin /qspark iframe. QSPARK's
    # AllowEmbedding middleware emits a scoped CSP `frame-ancestors` instead.

    # =========================================================================
    # QSPARK  —  mounted at /qspark   (separate app, separate public/ root)
    # =========================================================================
    # `^~` makes this prefix win over the regex `\.php$` block below, so QSPARK
    # requests never leak into QUAI's PHP handler.
    location ^~ /qspark {
        alias $app_root/QSPARK/public;

        # Serve real files (CSS/JS/build assets/images) straight from
        # QSPARK/public; send everything else to QSPARK's front controller.
        try_files $uri $uri/ @qspark;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/run/php/php8.2-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;

            # The key line. Telling Laravel that its front controller lives at
            # /qspark/index.php makes the router strip the /qspark prefix when
            # matching routes, while url()/route()/asset() re-add it. Together
            # with QSPARK's APP_URL=https://quailab.dev/qspark, every generated
            # link stays inside /qspark instead of escaping to the QUAI app.
            fastcgi_param SCRIPT_NAME /qspark/index.php;
        }
    }

    # Front-controller fallback for QSPARK. `last` re-runs location matching;
    # /qspark/index.php lands back in the block above. The original request
    # URI (with query string) is preserved for Laravel via $request_uri.
    location @qspark {
        rewrite ^ /qspark/index.php last;
    }

    # =========================================================================
    # QUAI  —  everything else
    # =========================================================================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Block dotfiles (.env, .git, ...) for both apps, but keep ACME challenges.
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
