<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz API Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .button { padding: 10px 20px; margin: 10px; background: #007cba; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .button:hover { background: #005a87; }
        .output { background: #f5f5f5; padding: 15px; border-radius: 4px; white-space: pre-wrap; font-family: monospace; max-height: 400px; overflow-y: auto; }
        .error { background: #ffe6e6; border-color: #ff9999; }
        .success { background: #e6ffe6; border-color: #99ff99; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Quiz API Test</h1>
        
        <div class="section">
            <h2>Step 1: Generate Quiz</h2>
            <p>Test the quiz generation endpoint</p>
            <button class="button" onclick="testGenerateQuiz()">Generate Quiz</button>
            <div id="generateOutput" class="output"></div>
        </div>
        
        <div class="section">
            <h2>Step 2: Get Quiz Results</h2>
            <p>Test the quiz results endpoint (requires thread_id from step 1)</p>
            <input type="text" id="threadIdInput" placeholder="Enter thread_id from step 1" style="width: 300px; padding: 8px; margin: 10px;">
            <button class="button" onclick="testGetQuizResults()">Get Quiz Results</button>
            <div id="resultsOutput" class="output"></div>
        </div>
        
        <div class="section">
            <h2>Step 3: Parse Questions</h2>
            <p>Test question parsing from API response</p>
            <textarea id="responseInput" placeholder="Paste API response here" style="width: 100%; height: 100px; padding: 8px; margin: 10px 0;"></textarea>
            <button class="button" onclick="testParseQuestions()">Parse Questions</button>
            <div id="parseOutput" class="output"></div>
        </div>
    </div>

    <script>
        // Use the same token from your browser session
        const token = "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJodHRwczovL2FwaS10ZXN0LnF1LmVkdS5zYSIsImF1ZCI6Imh0dHBzOi8vYXBpLXRlc3QucXUuZWR1LnNhIiwiaWF0IjoxNzU1MDgwOTU2LCJleHAiOjE3NTc2NzI5NTYsInN1YiI6IjQ0MzIxMTUxNyIsImRhdGEiOnsiaWQiOiI0NDMyMTE1MTciLCJuYW1lIjoiXHUwNjQ0XHUwNjRhXHUwNjI3XHUwNjQ2IFx1MDYyZFx1MDY0NVx1MDYyZiBcdTA2MzNcdTA2NDRcdTA2NGFcdTA2NDVcdTA2MjdcdTA2NDYgXHUwNjI3XHUwNjQ0XHUwNjJjXHUwNjMxXHUwNjRhXHUwNjM0IiwibmFtZV9lbiI6IkxBWUFOIEhBTUFEIFMgQUxKVVJBWVNIIiwiZW1haWwiOiI0NDMyMTE1MTdAZGN0ZXN0LmxvY2FsIiwidXNlcm5hbWUiOiI0NDMyMTE1MTciLCJyb2xlcyI6WyJzdHVkZW50Il0sImVtcGxveWVlX2lkIjoiNDQzMjExNTE3IiwidHlwZSI6InN0dWRlbnQifX0.X79zcmhXvxTDwPwq2hVTyM0o-prUwWaooPd19soA0xw";
        
        let currentThreadId = null;

        function log(elementId, message, isError = false) {
            const element = document.getElementById(elementId);
            const timestamp = new Date().toLocaleTimeString();
            element.textContent += `[${timestamp}] ${message}\n`;
            element.className = `output ${isError ? 'error' : 'success'}`;
            element.scrollTop = element.scrollHeight;
        }

        async function testGenerateQuiz() {
            const output = document.getElementById('generateOutput');
            output.textContent = '';
            
            try {
                log('generateOutput', 'Starting quiz generation...');
                
                const response = await fetch("https://api-test.qu.edu.sa/api/v2/courses/_478399_1/contents/_3634321_1/attachments/_5188772_1/generate-quiz", {
                    method: 'POST',
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Accept": "application/json",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        adaptive_learning: true
                    })
                });
                
                log('generateOutput', `Response status: ${response.status}`);
                log('generateOutput', `Response headers: ${JSON.stringify([...response.headers.entries()])}`);
                
                const responseText = await response.text();
                log('generateOutput', `Raw response: ${responseText}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${responseText}`);
                }
                
                const data = JSON.parse(responseText);
                log('generateOutput', `Parsed response: ${JSON.stringify(data, null, 2)}`);
                
                if (data.thread_id) {
                    currentThreadId = data.thread_id;
                    document.getElementById('threadIdInput').value = currentThreadId;
                    log('generateOutput', `Thread ID saved: ${currentThreadId}`);
                }
                
            } catch (error) {
                log('generateOutput', `Error: ${error.message}`, true);
                console.error('Generate quiz error:', error);
            }
        }

        async function testGetQuizResults() {
            const output = document.getElementById('resultsOutput');
            output.textContent = '';
            
            const threadId = document.getElementById('threadIdInput').value || currentThreadId;
            if (!threadId) {
                log('resultsOutput', 'Error: No thread_id provided', true);
                return;
            }
            
            try {
                log('resultsOutput', `Getting quiz results for thread: ${threadId}`);
                
                const response = await fetch(`https://api-test.qu.edu.sa/api/v2/courses/get-quiz-result?thread_id=${threadId}`, {
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Accept": "application/json"
                    }
                });
                
                log('resultsOutput', `Response status: ${response.status}`);
                log('resultsOutput', `Response headers: ${JSON.stringify([...response.headers.entries()])}`);
                
                const responseText = await response.text();
                log('resultsOutput', `Raw response: ${responseText}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${responseText}`);
                }
                
                const data = JSON.parse(responseText);
                log('resultsOutput', `Parsed response: ${JSON.stringify(data, null, 2)}`);
                
                // Try to extract questions
                const questions = extractQuestionsFromPayload(data);
                if (questions && questions.length > 0) {
                    log('resultsOutput', `Extracted ${questions.length} questions: ${JSON.stringify(questions, null, 2)}`);
                } else {
                    log('resultsOutput', 'No questions found in response');
                }
                
            } catch (error) {
                log('resultsOutput', `Error: ${error.message}`, true);
                console.error('Get quiz results error:', error);
            }
        }

        function testParseQuestions() {
            const output = document.getElementById('parseOutput');
            output.textContent = '';
            
            const responseText = document.getElementById('responseInput').value;
            if (!responseText) {
                log('parseOutput', 'Error: No response text provided', true);
                return;
            }
            
            try {
                log('parseOutput', 'Parsing response text...');
                log('parseOutput', `Input: ${responseText}`);
                
                // Try to parse as JSON first
                let data;
                try {
                    data = JSON.parse(responseText);
                    log('parseOutput', `Parsed as JSON: ${JSON.stringify(data, null, 2)}`);
                } catch (e) {
                    log('parseOutput', `Not valid JSON, treating as text: ${e.message}`);
                    data = responseText;
                }
                
                const questions = extractQuestionsFromPayload(data);
                if (questions && questions.length > 0) {
                    log('parseOutput', `Successfully extracted ${questions.length} questions:`);
                    log('parseOutput', JSON.stringify(questions, null, 2));
                } else {
                    log('parseOutput', 'No questions could be extracted from the response');
                }
                
            } catch (error) {
                log('parseOutput', `Error: ${error.message}`, true);
                console.error('Parse questions error:', error);
            }
        }

        // Copy the same extraction functions from the main code
        function extractQuestionsFromPayload(payload) {
            if (!payload) return null;
            
            if (Array.isArray(payload)) {
                return payload.length > 0 ? payload : null;
            }
            
            if (typeof payload === 'object') {
                if (Array.isArray(payload.questions)) {
                    return payload.questions;
                }
                if (payload.data && Array.isArray(payload.data.questions)) {
                    return payload.data.questions;
                }
                if (typeof payload.message === 'string') {
                    const fromMessage = extractQuestionsFromText(payload.message);
                    if (fromMessage?.length) return fromMessage;
                }
            }
            
            return extractQuestionsFromText(String(payload));
        }

        function extractQuestionsFromText(text) {
            if (!text) return [];
            
            // Skip instruction messages
            const isInstructions = text.includes('Read the attached PDF file') ||
                                   (text.includes('generate') && text.includes('questions') && !text.includes('"question"'));
            if (isInstructions) return [];

            // Try to extract JSON from code blocks first
            let block = text.match(/```json\s*([\s\S]*?)```/i) || text.match(/```\s*([\s\S]*?)```/i);
            if (block && block[1]) {
                const parsed = tryJsonParse(block[1].trim());
                if (parsed) {
                    const q = extractQuestionsFromPayload(parsed);
                    if (Array.isArray(q) && q.length > 0) return q;
                }
            }

            // Try to parse the entire text as JSON
            let parsed = tryJsonParse(text.trim());
            if (parsed) {
                const q = extractQuestionsFromPayload(parsed);
                if (Array.isArray(q) && q.length > 0) return q;
            }

            // Try to find JSON array in the text
            const arrStart = text.indexOf('['), arrEnd = text.lastIndexOf(']');
            if (arrStart !== -1 && arrEnd > arrStart) {
                const jsonStr = text.slice(arrStart, arrEnd + 1);
                parsed = tryJsonParse(jsonStr.trim());
                if (parsed && Array.isArray(parsed) && parsed.length > 0) {
                    return parsed.map(q => ({
                        question: q.question || q.text || 'Question',
                        options: q.options || q.choices || ['A','B','C','D'],
                        correctIndex: q.options && q.correct_answer ? q.options.indexOf(q.correct_answer) : (typeof q.correctIndex==='number'?q.correctIndex:0),
                        type: q.type || 'enemy',
                        difficulty: q.difficulty || 'easy'
                    }));
                }
            }

            return [];
        }

        function tryJsonParse(str) {
            if (!str || typeof str !== 'string') return null;
            try { 
                const cleaned = str.trim()
                    .replace(/[\u0000-\u001F\u007F-\u009F]/g, '')
                    .replace(/,\s*}/g, '}')
                    .replace(/,\s*]/g, ']');
                return JSON.parse(cleaned); 
            } catch (e) { 
                return null; 
            }
        }
    </script>
</body>
</html>
