<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الكلية التطبيقية - جامعة القصيم</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .navbar {
            background: linear-gradient(135deg, #1B8354, #0F5C3A);
            color: #fff;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .navbar-brand img {
            height: 40px;
        }

        .navbar-brand h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .navbar-brand p {
            font-size: 12px;
            opacity: 0.85;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            list-style: none;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.9;
            transition: opacity 0.2s;
        }

        .nav-links a:hover { opacity: 1; }

        .hero {
            background: linear-gradient(135deg, #0F5C3A 0%, #1B8354 50%, #22A068 100%);
            color: #fff;
            padding: 60px 24px;
            text-align: center;
        }

        .hero h2 {
            font-size: 32px;
            margin-bottom: 16px;
        }

        .hero p {
            font-size: 18px;
            opacity: 0.9;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.8;
        }

        .content {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 24px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .card h3 {
            font-size: 18px;
            color: #1B8354;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card h3 .icon {
            width: 32px;
            height: 32px;
            background: rgba(27,131,84,0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card p, .card li {
            font-size: 14px;
            color: #555;
            line-height: 1.8;
        }

        .card ul {
            padding-right: 20px;
        }

        .card li { margin-bottom: 6px; }

        .branches {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 40px;
        }

        .branches h3 {
            font-size: 20px;
            color: #1B8354;
            margin-bottom: 16px;
        }

        .branches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        .branch-item {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px 16px;
            text-align: center;
            font-size: 14px;
            color: #333;
        }

        .footer {
            background: #1a1a2e;
            color: #aaa;
            text-align: center;
            padding: 24px;
            font-size: 13px;
        }

        .footer a { color: #22A068; text-decoration: none; }

        .embed-section {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 40px;
            border: 2px dashed #1B8354;
        }

        .embed-section h3 {
            font-size: 18px;
            color: #1B8354;
            margin-bottom: 8px;
        }

        .embed-section p {
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
        }

        .embed-section code {
            display: block;
            background: #0f1623;
            color: #22A068;
            padding: 16px;
            border-radius: 8px;
            font-size: 13px;
            direction: ltr;
            text-align: left;
            overflow-x: auto;
            white-space: pre;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>


    <!-- Hero -->
    <section class="hero">
        <h2>التدريب التعاوني chatbot</h2>
    </section>

    <!-- Widget Embed Code (this is the actual working embed) -->
    <script src="/js/coop-training-widget.js"
        data-token="coop-training-qac"
        data-title="دليل التدريب التعاوني - الكلية التطبيقية">
    </script>

</body>
</html>
